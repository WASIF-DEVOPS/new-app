apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: db-secrets
  namespace: app
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "dev/three-tier-app/db"
        objectType: "secretsmanager"
        jmesPath:
          - path: DB_USER
            objectAlias: DB_USER
          - path: DB_PASSWORD
            objectAlias: DB_PASSWORD
          - path: DB_HOST
            objectAlias: DB_HOST
          - path: DB_NAME
            objectAlias: DB_NAME
  secretObjects:
    - secretName: db-secret
      type: Opaque
      data:
        - objectName: DB_USER
          key: DB_USER
        - objectName: DB_PASSWORD
          key: DB_PASSWORD
        - objectName: DB_HOST
          key: DB_HOST
        - objectName: DB_NAME
          key: DB_NAME
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: app
  annotations:
    eks.amazonaws.com/role-arn: ${app_irsa_role_arn}
