data:
  mapRoles: |
    - rolearn: arn:aws:iam::175200623112:role/dev-eks-cluster-node-role
      groups:
      - system:bootstrappers
      - system:nodes
      username: system:node:{{EC2PrivateDNSName}}
    - rolearn: arn:aws:iam::175200623112:role/dev-eks-cluster-jenkins-irsa
      username: jenkins
      groups:
      - system:masters
