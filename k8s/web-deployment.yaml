apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: 447777058729.dkr.ecr.us-east-1.amazonaws.com/three-tier-web:latest
          ports:
            - containerPort: 80
          env:
            - name: APP_URL
              value: "http://app-service:4000"
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: app
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
